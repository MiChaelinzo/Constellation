kind = "web"
previewPath = "/"
title = "Constellations"
version = "1.0.0"
id = "artifacts/constellations"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18617

[services.development]
run = "pnpm --filter @workspace/constellations run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/constellations", "run", "build" ]
publicDir = "artifacts/constellations/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18617"
BASE_PATH = "/"
